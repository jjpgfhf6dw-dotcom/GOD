<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超能力バトル VR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Helvetica Neue', sans-serif;
  overflow: hidden;
  color: #fff;
}
canvas { display: block; }
#ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#hud {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  align-items: center;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(100,200,255,0.3);
  border-radius: 12px;
  padding: 10px 24px;
  font-size: 14px;
  letter-spacing: 0.1em;
}
#hud .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#hud .label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.2em; }
#hud .value { font-size: 20px; font-weight: 300; }
#hp-bar-wrap { width: 160px; }
#hp-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #e74c3c, #e91e63); border-radius: 4px; transition: width 0.2s; }
#energy-bar-wrap { width: 160px; }
#energy-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #3498db, #9b59b6); border-radius: 4px; transition: width 0.2s; }
#enemy-count { font-size: 22px; font-weight: 300; color: #e74c3c; }
#crosshair {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(100,200,255,0.8);
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
#message {
  position: absolute;
  bottom: 120px; left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 200;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px rgba(100,200,255,0.8);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#controls-panel {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  pointer-events: all;
}
.ctrl-btn {
  background: rgba(20,30,50,0.85);
  border: 1px solid rgba(100,200,255,0.4);
  color: rgba(255,255,255,0.9);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: background 0.2s, border-color 0.2s;
}
.ctrl-btn:hover { background: rgba(40,80,120,0.85); border-color: rgba(100,200,255,0.8); }
.ctrl-btn.active { background: rgba(30,80,160,0.85); border-color: rgba(100,200,255,1); }
#vr-btn {
  background: rgba(60,10,100,0.85);
  border-color: rgba(180,100,255,0.6);
}
#vr-btn:hover { background: rgba(90,20,140,0.85); border-color: rgba(200,130,255,1); }
#skill-indicator {
  position: absolute;
  right: 24px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.skill-slot {
  width: 56px; height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.4);
  transition: border-color 0.2s, background 0.2s;
}
.skill-slot.active {
  border-color: rgba(100,200,255,0.8);
  background: rgba(10,50,100,0.6);
  color: #fff;
}
.skill-icon { font-size: 22px; margin-bottom: 2px; }
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: all;
}
#overlay h1 {
  font-size: 48px;
  font-weight: 100;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #64c8ff, #c364ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#overlay p { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.2em; margin-bottom: 16px; }
#overlay .key-hints { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; }
#overlay .key-hints span { display: flex; gap: 10px; justify-content: center; align-items: center; }
kbd {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: monospace;
}
#start-btn {
  margin-top: 16px;
  background: linear-gradient(135deg, rgba(30,80,180,0.8), rgba(90,20,160,0.8));
  border: 1px solid rgba(120,180,255,0.6);
  color: #fff;
  border-radius: 10px;
  padding: 12px 40px;
  font-size: 15px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(100,150,255,0.3); }
#game-over, #victory {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: all;
}
#game-over h2 { font-size: 52px; font-weight: 100; letter-spacing: 0.6em; color: #e74c3c; }
#victory h2 { font-size: 52px; font-weight: 100; letter-spacing: 0.4em; color: #64c8ff; }
#game-over p, #victory p { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.2em; }
.restart-btn {
  margin-top: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  border-radius: 8px;
  padding: 10px 30px;
  font-size: 14px;
  letter-spacing: 0.2em;
  cursor: pointer;
}
.restart-btn:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="hud">
    <div class="stat">
      <div class="label">HP</div>
      <div id="hp-bar-wrap">
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
      </div>
    </div>
    <div class="stat">
      <div class="label">エネルギー</div>
      <div id="energy-bar-wrap">
        <div id="energy-bar-bg"><div id="energy-bar"></div></div>
      </div>
    </div>
    <div class="stat">
      <div class="label">残り敵</div>
      <div class="value" id="enemy-count">10</div>
    </div>
    <div class="stat">
      <div class="label">スコア</div>
      <div class="value" id="score-display">0</div>
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="skill-indicator">
    <div class="skill-slot active" id="slot-rock">
      <div class="skill-icon">🪨</div>
      <div>岩投げ</div>
    </div>
    <div class="skill-slot" id="slot-wave">
      <div class="skill-icon">💨</div>
      <div>衝撃波</div>
    </div>
    <div class="skill-slot" id="slot-shield">
      <div class="skill-icon">🛡</div>
      <div>バリア</div>
    </div>
  </div>

  <div id="message"></div>

  <div id="controls-panel">
    <button class="ctrl-btn active" id="skill-rock-btn" onclick="selectSkill('rock')">🪨 岩投げ [1]</button>
    <button class="ctrl-btn" id="skill-wave-btn" onclick="selectSkill('wave')">💨 衝撃波 [2]</button>
    <button class="ctrl-btn" id="skill-shield-btn" onclick="selectSkill('shield')">🛡 バリア [3]</button>
    <button class="ctrl-btn" id="vr-btn" onclick="enterVR()">🥽 VRモード</button>
  </div>

  <div id="overlay">
    <h1>超能力バトル</h1>
    <p>10人の敵を超能力で倒せ</p>
    <div class="key-hints">
      <span><kbd>W A S D</kbd> 移動</span>
      <span><kbd>マウス</kbd> 視点 / <kbd>左クリック</kbd> 超能力発動</span>
      <span><kbd>1</kbd> 岩投げ &nbsp; <kbd>2</kbd> 衝撃波 &nbsp; <kbd>3</kbd> バリア</span>
      <span><kbd>VRボタン</kbd> または <kbd>🥽</kbd> でVRゴーグル対応</span>
    </div>
    <button id="start-btn" onclick="startGame()">ゲーム開始</button>
  </div>

  <div id="game-over">
    <h2>DEAD</h2>
    <p>敵の攻撃に倒れた</p>
    <button class="restart-btn" onclick="restartGame()">もう一度</button>
  </div>

  <div id="victory">
    <h2>VICTORY</h2>
    <p>全ての敵を倒した！</p>
    <div class="value" id="final-score" style="font-size:28px;color:#64c8ff;margin:8px 0;"></div>
    <button class="restart-btn" onclick="restartGame()">もう一度</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLOBALS ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
let renderer, scene, camera, xrSession = null;
let gameRunning = false, gameOver = false;
let score = 0;
let playerHP = 100, playerMaxHP = 100;
let playerEnergy = 100, playerMaxEnergy = 100;
let energyRegen = 0;
let currentSkill = 'rock';
let shieldActive = false, shieldTime = 0;
let pointerLocked = false;
let keys = {};
let mouseX = 0, mouseY = 0;
let yaw = 0, pitch = 0;
let enemies = [];
let rocks = [];
let waves = [];
let particles = [];
let shieldMesh = null;
let enemyBullets = [];
let lastEnemyAttack = 0;
let messageTimer = 0;
let frameId;
const ENEMY_COUNT = 10;
const ARENA_SIZE = 28;

// ─── RENDERER SETUP ───────────────────────────────────────────────────────
function initRenderer() {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05080f);
  scene.fog = new THREE.Fog(0x05080f, 20, 55);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.7, 0);

  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── SCENE BUILD ──────────────────────────────────────────────────────────
function buildScene() {
  scene.clear();
  rocks = []; waves = []; particles = []; enemies = []; enemyBullets = [];

  // Lights
  const ambient = new THREE.AmbientLight(0x1a1a2e, 1.5);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0x6688cc, 1.2);
  dir.position.set(5, 12, 5);
  dir.castShadow = true;
  dir.shadow.mapSize.set(1024, 1024);
  dir.shadow.camera.near = 0.5;
  dir.shadow.camera.far = 60;
  dir.shadow.camera.left = dir.shadow.camera.bottom = -20;
  dir.shadow.camera.right = dir.shadow.camera.top = 20;
  scene.add(dir);
  const pt1 = new THREE.PointLight(0x3355ff, 1.5, 20); pt1.position.set(-8, 5, -8); scene.add(pt1);
  const pt2 = new THREE.PointLight(0xff3355, 1.0, 18); pt2.position.set(8, 4, 8); scene.add(pt2);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(ARENA_SIZE * 2, ARENA_SIZE * 2, 40, 40);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d1520, roughness: 0.9, metalness: 0.1 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(ARENA_SIZE * 2, 40, 0x1a3366, 0x0d1a33);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Arena walls (invisible collision)
  // Decorative wall pillars
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = ARENA_SIZE - 2;
    const pillar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.5, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.7 })
    );
    pillar.position.set(Math.cos(angle) * r, 4, Math.sin(angle) * r);
    pillar.castShadow = true;
    scene.add(pillar);

    // Glowing orb on top
    const orb = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0x3366ff, emissive: 0x1133aa, emissiveIntensity: 1.5 })
    );
    orb.position.set(pillar.position.x, 8.4, pillar.position.z);
    scene.add(orb);
  }

  // Some rocks as obstacles
  const obstaclePositions = [
    [-6, 0, -6], [6, 0, -6], [-6, 0, 6], [6, 0, 6],
    [0, 0, -10], [0, 0, 10], [-10, 0, 0], [10, 0, 0]
  ];
  for (const [x, y, z] of obstaclePositions) {
    const s = 0.8 + Math.random() * 1.2;
    const obs = new THREE.Mesh(
      new THREE.DodecahedronGeometry(s, 0),
      new THREE.MeshStandardMaterial({ color: 0x253545, roughness: 1, metalness: 0.2 })
    );
    obs.position.set(x + (Math.random() - 0.5) * 2, s * 0.5, z + (Math.random() - 0.5) * 2);
    obs.rotation.set(Math.random(), Math.random(), Math.random());
    obs.castShadow = true;
    obs.receiveShadow = true;
    scene.add(obs);
  }

  // Shield mesh (around player)
  shieldMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 20, 20),
    new THREE.MeshStandardMaterial({ color: 0x00aaff, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
  );
  shieldMesh.visible = false;
  camera.add(shieldMesh);
  scene.add(camera);

  // Spawn enemies
  for (let i = 0; i < ENEMY_COUNT; i++) {
    spawnEnemy(i);
  }
}

// ─── ENEMY ────────────────────────────────────────────────────────────────
function spawnEnemy(id) {
  const angle = (id / ENEMY_COUNT) * Math.PI * 2 + Math.random() * 0.5;
  const dist = 10 + Math.random() * 10;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;

  // Body
  const bodyGeo = new THREE.CapsuleGeometry ? new THREE.CapsuleGeometry(0.3, 1.0, 4, 8)
    : new THREE.CylinderGeometry(0.3, 0.3, 1.4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2233, roughness: 0.6, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xdd3344, roughness: 0.5 })
  );
  head.position.y = 0.9;

  // Eyes glow
  const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff6600, emissiveIntensity: 2 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.1, 0.06, 0.22);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.1, 0.06, 0.22);
  head.add(eyeL, eyeR);

  const group = new THREE.Group();
  group.add(body, head);
  group.position.set(x, 0.8, z);
  scene.add(group);

  // HP bar (sprite)
  const barCanvas = document.createElement('canvas');
  barCanvas.width = 64; barCanvas.height = 12;
  const ctx = barCanvas.getContext('2d');
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 64, 12);
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(2, 2, 60, 8);
  const barTex = new THREE.CanvasTexture(barCanvas);
  const barMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.12),
    new THREE.MeshBasicMaterial({ map: barTex, transparent: true, depthWrite: false })
  );
  barMesh.position.y = 1.7;
  group.add(barMesh);

  enemies.push({
    id, group, body, head, barMesh, barCanvas, ctx: ctx, barTex,
    hp: 100, maxHp: 100,
    x, z,
    speed: 1.5 + Math.random() * 1.0,
    attackTimer: Math.random() * 3,
    alive: true,
    stagger: 0,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

// ─── SKILLS / PROJECTILES ────────────────────────────────────────────────
function fireRock() {
  if (playerEnergy < 20) { showMessage('エネルギー不足！'); return; }
  playerEnergy = Math.max(0, playerEnergy - 20);
  updateHUD();

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const rockGeo = new THREE.DodecahedronGeometry(0.3, 0);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.9 });
  const mesh = new THREE.Mesh(rockGeo, rockMat);
  mesh.castShadow = true;

  const origin = camera.position.clone().add(dir.clone().multiplyScalar(0.5));
  origin.y -= 0.1;
  mesh.position.copy(origin);

  // Glow aura
  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x6699ff, transparent: true, opacity: 0.3, depthWrite: false })
  );
  mesh.add(aura);
  scene.add(mesh);

  rocks.push({ mesh, dir: dir.clone(), speed: 18, life: 3.5, spin: new THREE.Vector3(Math.random(), Math.random(), Math.random()) });
  spawnParticles(origin, 0x6699ff, 6);
}

function fireWave() {
  if (playerEnergy < 35) { showMessage('エネルギー不足！'); return; }
  playerEnergy = Math.max(0, playerEnergy - 35);
  updateHUD();

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const origin = camera.position.clone().add(dir.clone().multiplyScalar(0.5));
  origin.y = camera.position.y;

  // Expand ring
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(0.2, 0.05, 8, 24),
    new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ccaa, emissiveIntensity: 1.5, transparent: true, opacity: 0.9 })
  );
  mesh.position.copy(origin);
  mesh.lookAt(origin.clone().add(dir));
  scene.add(mesh);
  waves.push({ mesh, dir: dir.clone(), speed: 25, life: 2.0, radius: 0.2 });
  spawnParticles(origin, 0x00ffcc, 12);
}

function activateShield() {
  if (playerEnergy < 30) { showMessage('エネルギー不足！'); return; }
  if (shieldActive) return;
  playerEnergy = Math.max(0, playerEnergy - 30);
  shieldActive = true;
  shieldTime = 4.0;
  shieldMesh.visible = true;
  shieldMesh.material.opacity = 0.3;
  updateHUD();
  showMessage('バリア展開！');
}

// ─── ENEMY ATTACKS ────────────────────────────────────────────────────────
function enemyAttack(enemy) {
  const dir = new THREE.Vector3();
  dir.subVectors(camera.position, enemy.group.position).normalize();
  dir.y = 0.05;

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 2 })
  );
  mesh.position.copy(enemy.group.position).add(new THREE.Vector3(0, 1.2, 0));
  scene.add(mesh);
  enemyBullets.push({ mesh, dir: dir.clone(), speed: 8, life: 5, fromEnemy: enemy.id });
}

// ─── PARTICLES ─────────────────────────────────────────────────────────── 
function spawnParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 4, 4),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1.5, transparent: true })
    );
    mesh.position.copy(pos);
    const vel = new THREE.Vector3((Math.random() - 0.5) * 8, Math.random() * 6 + 2, (Math.random() - 0.5) * 8);
    scene.add(mesh);
    particles.push({ mesh, vel, life: 0.6 + Math.random() * 0.4, maxLife: 1.0 });
  }
}

// ─── UPDATE ENEMY HP BAR ──────────────────────────────────────────────────
function updateEnemyBar(enemy) {
  const ctx = enemy.ctx;
  ctx.clearRect(0, 0, 64, 12);
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 64, 12);
  const pct = enemy.hp / enemy.maxHp;
  ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(2, 2, Math.floor(60 * pct), 8);
  enemy.barTex.needsUpdate = true;
  enemy.barMesh.lookAt(camera.position);
}

// ─── COLLISION ────────────────────────────────────────────────────────────
function checkRockEnemyCollision(rock) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const dist = rock.mesh.position.distanceTo(e.group.position);
    if (dist < 1.0) {
      hitEnemy(e, 34);
      spawnParticles(rock.mesh.position, 0xff8800, 10);
      return true;
    }
  }
  return false;
}

function checkWaveEnemyCollision(wave) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const dist = wave.mesh.position.distanceTo(e.group.position);
    if (dist < wave.radius + 0.8) {
      hitEnemy(e, 52);
      spawnParticles(wave.mesh.position, 0x00ffcc, 8);
      return true;
    }
  }
  return false;
}

function hitEnemy(enemy, dmg) {
  enemy.hp -= dmg;
  enemy.stagger = 0.4;
  updateEnemyBar(enemy);

  if (enemy.hp <= 0) {
    enemy.alive = false;
    enemy.group.visible = false;
    scene.remove(enemy.group);
    score += 100;
    spawnParticles(enemy.group.position, 0xff4422, 20);
    updateHUD();
    const aliveCount = enemies.filter(e => e.alive).length;
    if (aliveCount === 0) triggerVictory();
    else showMessage('撃破！ ×' + (ENEMY_COUNT - aliveCount));
  }
}

function checkBulletPlayerCollision(bullet) {
  const dist = bullet.mesh.position.distanceTo(camera.position);
  if (dist < 0.9) {
    if (shieldActive) {
      spawnParticles(bullet.mesh.position, 0x00aaff, 8);
      showMessage('バリアが防いだ！');
    } else {
      playerHP -= 25;
      updateHUD();
      if (playerHP <= 0) triggerDeath();
      else showMessage('ダメージ！');
      flashScreen(0xff0000);
    }
    return true;
  }
  return false;
}

function flashScreen(color) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(255,0,0,0.2);z-index:999;pointer-events:none;animation:none;`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 200);
}

// ─── HUD ────────────────────────────────────────────────────────────────── 
function updateHUD() {
  document.getElementById('hp-bar').style.width = Math.max(0, (playerHP / playerMaxHP) * 100) + '%';
  document.getElementById('energy-bar').style.width = Math.max(0, (playerEnergy / playerMaxEnergy) * 100) + '%';
  document.getElementById('enemy-count').textContent = enemies.filter(e => e.alive).length;
  document.getElementById('score-display').textContent = score;
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.opacity = '1';
  messageTimer = 2.0;
}

function selectSkill(skill) {
  currentSkill = skill;
  ['rock', 'wave', 'shield'].forEach(s => {
    document.getElementById('skill-' + s + '-btn').classList.toggle('active', s === skill);
    document.getElementById('slot-' + s).classList.toggle('active', s === skill);
  });
}

// ─── GAME FLOW ─────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  gameOver = false;
  playerHP = 100; playerEnergy = 100; score = 0;
  shieldActive = false;
  buildScene();
  updateHUD();
  requestPointerLock();
  animate();
}

function restartGame() {
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('victory').style.display = 'none';
  startGame();
}

function triggerDeath() {
  gameRunning = false;
  gameOver = true;
  document.getElementById('game-over').style.display = 'flex';
  document.exitPointerLock?.();
}

function triggerVictory() {
  gameRunning = false;
  document.getElementById('victory').style.display = 'flex';
  document.getElementById('final-score').textContent = 'スコア: ' + score;
  document.exitPointerLock?.();
}

// ─── POINTER LOCK ────────────────────────────────────────────────────────── 
function requestPointerLock() {
  canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
  canvas.requestPointerLock?.();
}

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked || !gameRunning) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});
document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (!gameRunning) return;
  if (!pointerLocked) { requestPointerLock(); return; }
  fireSkill();
});
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!gameRunning) return;
  if (e.code === 'Digit1') selectSkill('rock');
  if (e.code === 'Digit2') selectSkill('wave');
  if (e.code === 'Digit3') selectSkill('shield');
  if (e.code === 'Space') { e.preventDefault(); fireSkill(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('click', () => { if (gameRunning && !pointerLocked) requestPointerLock(); });

function fireSkill() {
  if (!gameRunning) return;
  if (currentSkill === 'rock') fireRock();
  else if (currentSkill === 'wave') fireWave();
  else if (currentSkill === 'shield') activateShield();
}

// ─── VR ───────────────────────────────────────────────────────────────────
async function enterVR() {
  if (!navigator.xr) { alert('このブラウザはWebXRに対応していません。\nOculus BrowserまたはChrome for Androidをお試しください。'); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!supported) { alert('VRデバイスが検出されません。\nVRゴーグルを接続してください。'); return; }
  const session = await navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor', 'bounded-floor'] });
  renderer.xr.setSession(session);
  xrSession = session;
  session.addEventListener('end', () => { xrSession = null; });
  if (!gameRunning) startGame();
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────
let lastTime = 0;
function animate(time = 0) {
  frameId = renderer.xr.isPresenting
    ? renderer.setAnimationLoop(xrAnimate)
    : requestAnimationFrame(animate);
  if (!renderer.xr.isPresenting) xrAnimate(time);
}

function xrAnimate(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  if (!gameRunning) { renderer.render(scene, camera); return; }

  // Player movement
  const moveSpeed = 5 * dt;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  const moveDir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(forward);
  if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(forward);
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
  if (moveDir.length() > 0) {
    moveDir.normalize();
    camera.position.addScaledVector(moveDir, moveSpeed);
    // Arena bounds
    camera.position.x = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, camera.position.x));
    camera.position.z = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, camera.position.z));
  }
  camera.position.y = 1.7;

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Energy regen
  energyRegen += dt;
  if (energyRegen > 0.5) { energyRegen = 0; playerEnergy = Math.min(playerMaxEnergy, playerEnergy + 5); updateHUD(); }

  // Shield timer
  if (shieldActive) {
    shieldTime -= dt;
    if (shieldTime <= 0) {
      shieldActive = false;
      shieldMesh.visible = false;
    } else {
      shieldMesh.material.opacity = 0.15 + 0.15 * Math.sin(time * 0.005);
      shieldMesh.rotation.y += dt;
    }
  }

  // Message timer
  if (messageTimer > 0) {
    messageTimer -= dt;
    if (messageTimer <= 0) document.getElementById('message').style.opacity = '0';
  }

  // Update rocks
  rocks = rocks.filter(r => {
    r.life -= dt;
    if (r.life <= 0) { scene.remove(r.mesh); return false; }
    r.mesh.position.addScaledVector(r.dir, r.speed * dt);
    r.mesh.rotation.x += r.spin.x * dt * 3;
    r.mesh.rotation.y += r.spin.y * dt * 3;
    if (r.mesh.position.y > 0) r.dir.y -= 4 * dt; // gravity
    if (r.mesh.position.y < 0) { scene.remove(r.mesh); return false; }
    if (checkRockEnemyCollision(r)) { scene.remove(r.mesh); return false; }
    return true;
  });

  // Update waves
  waves = waves.filter(w => {
    w.life -= dt;
    if (w.life <= 0) { scene.remove(w.mesh); return false; }
    w.mesh.position.addScaledVector(w.dir, w.speed * dt);
    w.radius += w.speed * dt * 0.15;
    w.mesh.scale.setScalar(1 + (1.0 - w.life / 2.0) * 3);
    w.mesh.material.opacity = w.life / 2.0;
    if (checkWaveEnemyCollision(w)) { scene.remove(w.mesh); return false; }
    return true;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.life -= dt;
    if (b.life <= 0) { scene.remove(b.mesh); return false; }
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);
    b.mesh.rotation.x += dt * 4;
    // Enemy-enemy collision (no damage between enemies)
    if (checkBulletPlayerCollision(b)) { scene.remove(b.mesh); return false; }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.life -= dt;
    if (p.life <= 0) { scene.remove(p.mesh); return false; }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = p.life / p.maxLife;
    return true;
  });

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    e.attackTimer -= dt;
    if (e.stagger > 0) { e.stagger -= dt; continue; }

    const toPlayer = new THREE.Vector3().subVectors(camera.position, e.group.position);
    const dist = toPlayer.length();
    toPlayer.normalize();
    toPlayer.y = 0;

    // Move toward player
    const spd = e.speed * dt;
    e.group.position.addScaledVector(toPlayer, spd);
    e.group.position.y = 0.8;
    e.group.lookAt(camera.position.x, 0.8, camera.position.z);

    // Bob animation
    e.group.position.y = 0.8 + Math.sin(time * 0.003 + e.bobOffset) * 0.05;

    // Attack
    if (e.attackTimer <= 0 && dist < 20) {
      e.attackTimer = 2.0 + Math.random() * 2.0;
      enemyAttack(e);
    }

    // Melee damage if very close
    if (dist < 1.2) {
      playerHP -= 10 * dt;
      updateHUD();
      if (playerHP <= 0) triggerDeath();
    }

    updateEnemyBar(e);
  }

  renderer.render(scene, camera);
}

// ─── INIT ──────────────────────────────────────────────────────────────────
initRenderer();
renderer.setAnimationLoop(null);
requestAnimationFrame(animate);

// Expose for buttons
window.selectSkill = selectSkill;
window.enterVR = enterVR;
window.startGame = startGame;
window.restartGame = restartGame;
</script>
