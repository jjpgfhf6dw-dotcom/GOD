<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超能力バトル VR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Helvetica Neue', sans-serif;
  overflow: hidden;
  color: #fff;
}
canvas { display: block; }
#ui {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#hud {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  align-items: center;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(100,200,255,0.3);
  border-radius: 12px;
  padding: 10px 24px;
  font-size: 14px;
  letter-spacing: 0.1em;
}
#hud .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#hud .label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.2em; }
#hud .value { font-size: 20px; font-weight: 300; }
#hp-bar-wrap { width: 160px; }
#hp-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #e74c3c, #e91e63); border-radius: 4px; transition: width 0.2s; }
#energy-bar-wrap { width: 160px; }
#energy-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
#energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #3498db, #9b59b6); border-radius: 4px; transition: width 0.2s; }
#enemy-count { font-size: 22px; font-weight: 300; color: #e74c3c; }
#crosshair {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(100,200,255,0.8);
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
#message {
  position: absolute;
  bottom: 120px; left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 200;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px rgba(100,200,255,0.8);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#controls-panel {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  pointer-events: all;
}
.ctrl-btn {
  background: rgba(20,30,50,0.85);
  border: 1px solid rgba(100,200,255,0.4);
  color: rgba(255,255,255,0.9);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: background 0.2s, border-color 0.2s;
}
.ctrl-btn:hover { background: rgba(40,80,120,0.85); border-color: rgba(100,200,255,0.8); }
.ctrl-btn.active { background: rgba(30,80,160,0.85); border-color: rgba(100,200,255,1); }
#vr-btn {
  background: rgba(60,10,100,0.85);
  border-color: rgba(180,100,255,0.6);
}
#vr-btn:hover { background: rgba(90,20,140,0.85); border-color: rgba(200,130,255,1); }
#skill-indicator {
  position: absolute;
  right: 24px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.skill-slot {
  width: 56px; height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.4);
  transition: border-color 0.2s, background 0.2s;
}
.skill-slot.active {
  border-color: rgba(100,200,255,0.8);
  background: rgba(10,50,100,0.6);
  color: #fff;
}
.skill-icon { font-size: 22px; margin-bottom: 2px; }
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: all;
}
#overlay h1 {
  font-size: 48px;
  font-weight: 100;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #64c8ff, #c364ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#overlay p { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.2em; margin-bottom: 16px; }
#overlay .key-hints { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; }
#overlay .key-hints span { display: flex; gap: 10px; justify-content: center; align-items: center; }
kbd {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: monospace;
}
#start-btn {
  margin-top: 16px;
  background: linear-gradient(135deg, rgba(30,80,180,0.8), rgba(90,20,160,0.8));
  border: 1px solid rgba(120,180,255,0.6);
  color: #fff;
  border-radius: 10px;
  padding: 12px 40px;
  font-size: 15px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(100,150,255,0.3); }
#game-over, #victory {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: all;
}
#game-over h2 { font-size: 52px; font-weight: 100; letter-spacing: 0.6em; color: #e74c3c; }
#victory h2 { font-size: 52px; font-weight: 100; letter-spacing: 0.4em; color: #64c8ff; }
#game-over p, #victory p { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.2em; }
.restart-btn {
  margin-top: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  border-radius: 8px;
  padding: 10px 30px;
  font-size: 14px;
  letter-spacing: 0.2em;
  cursor: pointer;
}
.restart-btn:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="hud">
    <div class="stat">
      <div class="label">HP</div>
      <div id="hp-bar-wrap">
        <div id="hp-bar-bg"><div id="hp-bar"></div></div>
      </div>
    </div>
    <div class="stat">
      <div class="label">エネルギー</div>
      <div id="energy-bar-wrap">
        <div id="energy-bar-bg"><div id="energy-bar"></div></div>
      </div>
    </div>
    <div class="stat">
      <div class="label">残り敵</div>
      <div class="value" id="enemy-count">10</div>
    </div>
    <div class="stat">
      <div class="label">スコア</div>
      <div class="value" id="score-display">0</div>
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="skill-indicator">
    <div class="skill-slot active" id="slot-rock">
      <div class="skill-icon">🪨</div>
      <div>岩投げ</div>
    </div>
    <div class="skill-slot" id="slot-wave">
      <div class="skill-icon">💨</div>
      <div>衝撃波</div>
    </div>
    <div class="skill-slot" id="slot-shield">
      <div class="skill-icon">🛡</div>
      <div>バリア</div>
    </div>
  </div>

  <div id="message"></div>

  <div id="controls-panel">
    <button class="ctrl-btn active" id="skill-rock-btn" onclick="selectSkill('rock')">🪨 岩投げ [1]</button>
    <button class="ctrl-btn" id="skill-wave-btn" onclick="selectSkill('wave')">💨 衝撃波 [2]</button>
    <button class="ctrl-btn" id="skill-shield-btn" onclick="selectSkill('shield')">🛡 バリア [3]</button>
    <button class="ctrl-btn" id="vr-btn" onclick="enterVR()">🥽 VRモード</button>
  </div>

  <div id="vr-guide" style="display:none; position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.6); border:1px solid rgba(100,200,255,0.3); border-radius:10px;
    padding:10px 20px; font-size:12px; letter-spacing:0.08em; color:rgba(255,255,255,0.75);
    display:none; flex-direction:column; gap:4px; text-align:center; pointer-events:none;">
    <div style="color:rgba(100,200,255,0.9); font-size:11px; margin-bottom:2px;">── VR コントローラー操作 ──</div>
    <div>🟦 右トリガー → 🪨 岩投げ　　🟦 右グリップ → 💨 衝撃波</div>
    <div>🟨 左トリガー / グリップ → 🛡 バリア　　Aボタン → スキル切替</div>
    <div>🕹 左スティック → 移動</div>
  </div>

  <div id="overlay">
    <h1>超能力バトル</h1>
    <p>10人の敵を超能力で倒せ</p>
    <div class="key-hints">
      <span><kbd>W A S D</kbd> 移動</span>
      <span><kbd>マウス</kbd> 視点 / <kbd>左クリック</kbd> 超能力発動</span>
      <span><kbd>1</kbd> 岩投げ &nbsp; <kbd>2</kbd> 衝撃波 &nbsp; <kbd>3</kbd> バリア</span>
      <span><kbd>VRボタン</kbd> または <kbd>🥽</kbd> でVRゴーグル対応</span>
    </div>
    <button id="start-btn" onclick="startGame()">ゲーム開始</button>
  </div>

  <div id="game-over">
    <h2>DEAD</h2>
    <p>敵の攻撃に倒れた</p>
    <button class="restart-btn" onclick="restartGame()">もう一度</button>
  </div>

  <div id="victory">
    <h2>VICTORY</h2>
    <p>全ての敵を倒した！</p>
    <div class="value" id="final-score" style="font-size:28px;color:#64c8ff;margin:8px 0;"></div>
    <button class="restart-btn" onclick="restartGame()">もう一度</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLOBALS ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
let renderer, scene, camera, xrSession = null;
let gameRunning = false, gameOver = false;
let score = 0;
let playerHP = 100, playerMaxHP = 100;
let playerEnergy = 100, playerMaxEnergy = 100;
let energyRegen = 0;
let currentSkill = 'rock';
let shieldActive = false, shieldTime = 0;
let pointerLocked = false;
let keys = {};
let mouseX = 0, mouseY = 0;
let yaw = 0, pitch = 0;
let enemies = [];
let rocks = [];
let waves = [];
let particles = [];
let shieldMesh = null;
let enemyBullets = [];
let lastEnemyAttack = 0;
let messageTimer = 0;
let vrControllerPrev = null;
let frameId;
const ENEMY_COUNT = 10;
const ARENA_SIZE = 28;

// ─── RENDERER SETUP ───────────────────────────────────────────────────────
function initRenderer() {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05080f);
  scene.fog = new THREE.Fog(0x05080f, 20, 55);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.7, 0);

  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── SCENE BUILD ──────────────────────────────────────────────────────────
function buildScene() {
  scene.clear();
  rocks = []; waves = []; particles = []; enemies = []; enemyBullets = [];
  humanoids = []; humanoidIdCounter = 0;

  // Lights
  const ambient = new THREE.AmbientLight(0x1a1a2e, 1.5);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0x6688cc, 1.2);
  dir.position.set(5, 12, 5);
  dir.castShadow = true;
  dir.shadow.mapSize.set(1024, 1024);
  dir.shadow.camera.near = 0.5;
  dir.shadow.camera.far = 60;
  dir.shadow.camera.left = dir.shadow.camera.bottom = -20;
  dir.shadow.camera.right = dir.shadow.camera.top = 20;
  scene.add(dir);
  const pt1 = new THREE.PointLight(0x3355ff, 1.5, 20); pt1.position.set(-8, 5, -8); scene.add(pt1);
  const pt2 = new THREE.PointLight(0xff3355, 1.0, 18); pt2.position.set(8, 4, 8); scene.add(pt2);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(ARENA_SIZE * 2, ARENA_SIZE * 2, 40, 40);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d1520, roughness: 0.9, metalness: 0.1 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(ARENA_SIZE * 2, 40, 0x1a3366, 0x0d1a33);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Arena walls (invisible collision)
  // Decorative wall pillars
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = ARENA_SIZE - 2;
    const pillar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.5, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.7 })
    );
    pillar.position.set(Math.cos(angle) * r, 4, Math.sin(angle) * r);
    pillar.castShadow = true;
    scene.add(pillar);

    // Glowing orb on top
    const orb = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0x3366ff, emissive: 0x1133aa, emissiveIntensity: 1.5 })
    );
    orb.position.set(pillar.position.x, 8.4, pillar.position.z);
    scene.add(orb);
  }

  // Some rocks as obstacles
  const obstaclePositions = [
    [-6, 0, -6], [6, 0, -6], [-6, 0, 6], [6, 0, 6],
    [0, 0, -10], [0, 0, 10], [-10, 0, 0], [10, 0, 0]
  ];
  for (const [x, y, z] of obstaclePositions) {
    const s = 0.8 + Math.random() * 1.2;
    const obs = new THREE.Mesh(
      new THREE.DodecahedronGeometry(s, 0),
      new THREE.MeshStandardMaterial({ color: 0x253545, roughness: 1, metalness: 0.2 })
    );
    obs.position.set(x + (Math.random() - 0.5) * 2, s * 0.5, z + (Math.random() - 0.5) * 2);
    obs.rotation.set(Math.random(), Math.random(), Math.random());
    obs.castShadow = true;
    obs.receiveShadow = true;
    scene.add(obs);
  }

  // Shield mesh (around player)
  shieldMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 20, 20),
    new THREE.MeshStandardMaterial({ color: 0x00aaff, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
  );
  shieldMesh.visible = false;
  camera.add(shieldMesh);
  scene.add(camera);

  // Spawn enemies
  for (let i = 0; i < ENEMY_COUNT; i++) {
    spawnEnemy(i);
  }

  // 人型リスポーン敵 3体
  for (let i = 0; i < HUMANOID_COUNT; i++) {
    spawnHumanoid(i);
  }
}

// ─── ENEMY ────────────────────────────────────────────────────────────────
function spawnEnemy(id) {
  const angle = (id / ENEMY_COUNT) * Math.PI * 2 + Math.random() * 0.5;
  const dist = 10 + Math.random() * 10;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;

  // Body
  const bodyGeo = new THREE.CapsuleGeometry ? new THREE.CapsuleGeometry(0.3, 1.0, 4, 8)
    : new THREE.CylinderGeometry(0.3, 0.3, 1.4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2233, roughness: 0.6, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xdd3344, roughness: 0.5 })
  );
  head.position.y = 0.9;

  // Eyes glow
  const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff6600, emissiveIntensity: 2 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.1, 0.06, 0.22);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.1, 0.06, 0.22);
  head.add(eyeL, eyeR);

  const group = new THREE.Group();
  group.add(body, head);
  group.position.set(x, 0.8, z);
  scene.add(group);

  // HP bar (sprite)
  const barCanvas = document.createElement('canvas');
  barCanvas.width = 64; barCanvas.height = 12;
  const ctx = barCanvas.getContext('2d');
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 64, 12);
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(2, 2, 60, 8);
  const barTex = new THREE.CanvasTexture(barCanvas);
  const barMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.12),
    new THREE.MeshBasicMaterial({ map: barTex, transparent: true, depthWrite: false })
  );
  barMesh.position.y = 1.7;
  group.add(barMesh);

  enemies.push({
    id, group, body, head, barMesh, barCanvas, ctx: ctx, barTex,
    hp: 100, maxHp: 100,
    x, z,
    speed: 1.5 + Math.random() * 1.0,
    attackTimer: Math.random() * 3,
    alive: true,
    stagger: 0,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

// ─── 人型リスポーン敵 ──────────────────────────────────────────────────────
const HUMANOID_COUNT = 3;
let humanoids = [];
let humanoidIdCounter = 0;

function createHumanoidMesh(color) {
  const group = new THREE.Group();
  const mat = (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.6, metalness: 0.2 });

  // 胴体
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.58, 0.22), mat(color));
  torso.position.y = 0.9; torso.castShadow = true;
  group.add(torso);

  // 頭
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.28, 0.28), mat(color));
  head.position.y = 1.42; head.castShadow = true;
  // 目
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 3 });
  const eyeGeo = new THREE.SphereGeometry(0.045, 6, 6);
  const eL = new THREE.Mesh(eyeGeo, eyeMat); eL.position.set(-0.08, 0.04, 0.145);
  const eR = new THREE.Mesh(eyeGeo, eyeMat); eR.position.set(0.08, 0.04, 0.145);
  head.add(eL, eR);
  group.add(head);

  // 首
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.1, 6), mat(color));
  neck.position.y = 1.24; group.add(neck);

  // 腕（左右）
  for (const side of [-1, 1]) {
    const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.34, 6), mat(color));
    upperArm.position.set(side * 0.28, 0.94, 0);
    upperArm.rotation.z = side * 0.25;
    upperArm.castShadow = true;
    group.add(upperArm);

    const foreArm = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.05, 0.3, 6), mat(color));
    foreArm.position.set(side * 0.4, 0.68, 0);
    foreArm.rotation.z = side * 0.5;
    foreArm.castShadow = true;
    group.add(foreArm);
  }

  // 脚（左右）
  for (const side of [-1, 1]) {
    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.38, 6), mat(color));
    thigh.position.set(side * 0.13, 0.42, 0);
    thigh.castShadow = true;
    group.add(thigh);

    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.36, 6), mat(color));
    shin.position.set(side * 0.14, 0.08, 0);
    shin.castShadow = true;
    group.add(shin);
  }

  // 名前ラベル（Canvas）
  const labelCv = document.createElement('canvas');
  labelCv.width = 128; labelCv.height = 32;
  const lctx = labelCv.getContext('2d');
  lctx.fillStyle = 'rgba(0,0,0,0.6)';
  lctx.roundRect(0, 0, 128, 32, 6); lctx.fill();
  lctx.fillStyle = '#ff6644';
  lctx.font = 'bold 16px sans-serif';
  lctx.textAlign = 'center';
  lctx.fillText('⚠ 人型敵', 64, 22);
  const labelTex = new THREE.CanvasTexture(labelCv);
  const label = new THREE.Mesh(
    new THREE.PlaneGeometry(0.7, 0.18),
    new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, depthWrite: false })
  );
  label.position.y = 1.85;
  group.add(label);

  return { group, head, torso, label, labelTex };
}

function spawnHumanoid(id) {
  // プレイヤーから8m以上離れたランダム位置
  let x, z;
  do {
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 14;
    x = Math.cos(angle) * dist;
    z = Math.sin(angle) * dist;
  } while (Math.abs(x) > ARENA_SIZE - 2 || Math.abs(z) > ARENA_SIZE - 2);

  const colors = [0x22aa55, 0xaa7700, 0x6622cc];
  const { group, head, torso, label, labelTex } = createHumanoidMesh(colors[id % colors.length]);
  group.position.set(x, 0, z);
  scene.add(group);

  humanoids.push({
    uid: humanoidIdCounter++,
    id,
    group, head, torso, label, labelTex,
    alive: true,
    respawnTimer: 0,
    x, z,
    speed: 1.8 + Math.random() * 1.2,
    attackTimer: 1.5 + Math.random() * 2,
    walkCycle: Math.random() * Math.PI * 2,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

function killHumanoid(h, hitPos) {
  h.alive = false;
  spawnParticles(hitPos || h.group.position.clone().add(new THREE.Vector3(0,1,0)), 0xff6622, 22);
  scene.remove(h.group);
  score += 150;
  updateHUD();
  showMessage('人型敵 撃破！ +150');

  // 5秒後にリスポーン
  h.respawnTimer = 5.0;
}

function updateHumanoids(dt, time) {
  for (const h of humanoids) {
    if (!h.alive) {
      // リスポーンカウントダウン
      h.respawnTimer -= dt;
      if (h.respawnTimer <= 0) {
        // グループを再作成してリスポーン
        const colors = [0x22aa55, 0xaa7700, 0x6622cc];
        const { group, head, torso, label, labelTex } = createHumanoidMesh(colors[h.id % colors.length]);
        let x, z;
        do {
          const angle = Math.random() * Math.PI * 2;
          const dist = 8 + Math.random() * 14;
          x = Math.cos(angle) * dist;
          z = Math.sin(angle) * dist;
        } while (Math.abs(x) > ARENA_SIZE - 2 || Math.abs(z) > ARENA_SIZE - 2);

        group.position.set(x, 0, z);
        scene.add(group);
        h.group = group; h.head = head; h.torso = torso; h.label = label; h.labelTex = labelTex;
        h.x = x; h.z = z;
        h.alive = true;
        h.attackTimer = 2.0 + Math.random() * 2;
        showMessage('人型敵 リスポーン！');
      }
      continue;
    }

    // プレイヤーへ向かって移動
    const toPlayer = new THREE.Vector3().subVectors(camera.position, h.group.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();
    toPlayer.normalize();

    if (dist > 1.4) {
      h.group.position.addScaledVector(toPlayer, h.speed * dt);
    }
    h.group.position.x = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, h.group.position.x));
    h.group.position.z = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, h.group.position.z));
    h.group.lookAt(camera.position.x, h.group.position.y, camera.position.z);

    // 歩行アニメーション（脚のbob）
    h.walkCycle += dt * h.speed * 3.5;
    h.group.position.y = Math.abs(Math.sin(h.walkCycle)) * 0.06;

    // ラベルを常にカメラへ向ける
    h.label.lookAt(camera.position);

    // 近接攻撃
    h.attackTimer -= dt;
    if (h.attackTimer <= 0 && dist < 1.8) {
      h.attackTimer = 2.0 + Math.random() * 1.5;
      if (!shieldActive) {
        playerHP -= 20;
        updateHUD();
        flashScreen(0xff4400);
        if (playerHP <= 0) triggerDeath();
        else showMessage('人型敵に殴られた！');
      } else {
        showMessage('バリアが防いだ！');
      }
    }

    // 弾攻撃（距離がある時）
    if (h.attackTimer <= 0 && dist >= 1.8 && dist < 18) {
      h.attackTimer = 2.5 + Math.random() * 2;
      enemyAttack({ group: h.group, id: -h.uid - 1 }); // 負IDで人型敵と区別
    }
  }
}

function checkRockHumanoidCollision(rock) {
  for (const h of humanoids) {
    if (!h.alive) continue;
    const hitPos = rock.mesh.position.clone();
    const dist = hitPos.distanceTo(h.group.position.clone().add(new THREE.Vector3(0, 1, 0)));
    if (dist < 1.1) {
      killHumanoid(h, hitPos);
      return true;
    }
  }
  return false;
}
  if (!xrSession) return null;
  for (let i = 0; i < 2; i++) {
    const src = [...xrSession.inputSources].find(s => s.handedness === 'right');
    if (src) {
      // Three.jsのgetController(i)はinputSources順と一致
      const idx = [...xrSession.inputSources].indexOf(src);
      return renderer.xr.getController(idx >= 0 ? idx : 0);
    }
  }
  return renderer.xr.getController(0);
}

function getFireDirection() {
  const dir = new THREE.Vector3();
  if (renderer.xr.isPresenting) {
    const ctrl = getRightController();
    if (ctrl) {
      // Three.jsのXRControllerは-Z方向が「前」
      ctrl.getWorldDirection(dir);
      dir.negate();
    } else {
      camera.getWorldDirection(dir);
    }
  } else {
    camera.getWorldDirection(dir);
  }
  return dir;
}

function getFireOrigin() {
  const pos = new THREE.Vector3();
  if (renderer.xr.isPresenting) {
    const ctrl = getRightController();
    if (ctrl) ctrl.getWorldPosition(pos);
    else camera.getWorldPosition(pos);
  } else {
    camera.getWorldPosition(pos);
  }
  return pos;
}
function fireRock() {
  if (playerEnergy < 20) { showMessage('エネルギー不足！'); return; }
  playerEnergy = Math.max(0, playerEnergy - 20);
  updateHUD();

  const dir = getFireDirection();
  const origin = getFireOrigin();
  origin.addScaledVector(dir, 0.5);
  origin.y -= 0.1;

  const rockGeo = new THREE.DodecahedronGeometry(0.3, 0);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.9 });
  const mesh = new THREE.Mesh(rockGeo, rockMat);
  mesh.castShadow = true;
  mesh.position.copy(origin);

  // Glow aura
  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x6699ff, transparent: true, opacity: 0.3, depthWrite: false })
  );
  mesh.add(aura);
  scene.add(mesh);

  rocks.push({ mesh, dir: dir.clone(), speed: 18, life: 3.5, spin: new THREE.Vector3(Math.random(), Math.random(), Math.random()) });
  spawnParticles(origin, 0x6699ff, 6);
}

function fireWave() {
  if (playerEnergy < 35) { showMessage('エネルギー不足！'); return; }
  playerEnergy = Math.max(0, playerEnergy - 35);
  updateHUD();

  const dir = getFireDirection();
  const origin = getFireOrigin();
  origin.addScaledVector(dir, 0.5);

  // Expand ring
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(0.2, 0.05, 8, 24),
    new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ccaa, emissiveIntensity: 1.5, transparent: true, opacity: 0.9 })
  );
  mesh.position.copy(origin);
  mesh.lookAt(origin.clone().add(dir));
  scene.add(mesh);
  waves.push({ mesh, dir: dir.clone(), speed: 25, life: 2.0, radius: 0.2 });
  spawnParticles(origin, 0x00ffcc, 12);
}

function activateShield() {
  if (playerEnergy < 30) { showMessage('エネルギー不足！'); return; }
  if (shieldActive) return;
  playerEnergy = Math.max(0, playerEnergy - 30);
  shieldActive = true;
  shieldTime = 4.0;
  shieldMesh.visible = true;
  shieldMesh.material.opacity = 0.3;
  updateHUD();
  showMessage('バリア展開！');
}

// ─── ENEMY ATTACKS ────────────────────────────────────────────────────────
function enemyAttack(enemy) {
  const dir = new THREE.Vector3();
  dir.subVectors(camera.position, enemy.group.position).normalize();
  dir.y = 0.05;

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 2 })
  );
  mesh.position.copy(enemy.group.position).add(new THREE.Vector3(0, 1.2, 0));
  scene.add(mesh);
  enemyBullets.push({ mesh, dir: dir.clone(), speed: 8, life: 5, fromEnemy: enemy.id });
}

// ─── PARTICLES ─────────────────────────────────────────────────────────── 
function spawnParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 4, 4),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1.5, transparent: true })
    );
    mesh.position.copy(pos);
    const vel = new THREE.Vector3((Math.random() - 0.5) * 8, Math.random() * 6 + 2, (Math.random() - 0.5) * 8);
    scene.add(mesh);
    particles.push({ mesh, vel, life: 0.6 + Math.random() * 0.4, maxLife: 1.0 });
  }
}

// ─── UPDATE ENEMY HP BAR ──────────────────────────────────────────────────
function updateEnemyBar(enemy) {
  const ctx = enemy.ctx;
  ctx.clearRect(0, 0, 64, 12);
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 64, 12);
  const pct = enemy.hp / enemy.maxHp;
  ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(2, 2, Math.floor(60 * pct), 8);
  enemy.barTex.needsUpdate = true;
  enemy.barMesh.lookAt(camera.position);
}

// ─── COLLISION ────────────────────────────────────────────────────────────
function checkRockEnemyCollision(rock) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const dist = rock.mesh.position.distanceTo(e.group.position);
    if (dist < 1.0) {
      hitEnemy(e, 34);
      spawnParticles(rock.mesh.position, 0xff8800, 10);
      return true;
    }
  }
  return false;
}

function checkWaveEnemyCollision(wave) {
  for (const e of enemies) {
    if (!e.alive) continue;
    const dist = wave.mesh.position.distanceTo(e.group.position);
    if (dist < wave.radius + 0.8) {
      hitEnemy(e, 52);
      spawnParticles(wave.mesh.position, 0x00ffcc, 8);
      return true;
    }
  }
  return false;
}

function hitEnemy(enemy, dmg) {
  enemy.hp -= dmg;
  enemy.stagger = 0.4;
  updateEnemyBar(enemy);

  if (enemy.hp <= 0) {
    enemy.alive = false;
    enemy.group.visible = false;
    scene.remove(enemy.group);
    score += 100;
    spawnParticles(enemy.group.position, 0xff4422, 20);
    updateHUD();
    const aliveCount = enemies.filter(e => e.alive).length;
    if (aliveCount === 0) triggerVictory();
    else showMessage('撃破！ ×' + (ENEMY_COUNT - aliveCount));
  }
}

function checkBulletPlayerCollision(bullet) {
  const dist = bullet.mesh.position.distanceTo(camera.position);
  if (dist < 0.9) {
    if (shieldActive) {
      spawnParticles(bullet.mesh.position, 0x00aaff, 8);
      showMessage('バリアが防いだ！');
    } else {
      playerHP -= 25;
      updateHUD();
      if (playerHP <= 0) triggerDeath();
      else showMessage('ダメージ！');
      flashScreen(0xff0000);
    }
    return true;
  }
  return false;
}

function flashScreen(color) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(255,0,0,0.2);z-index:999;pointer-events:none;animation:none;`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 200);
}

// ─── HUD ────────────────────────────────────────────────────────────────── 
function updateHUD() {
  document.getElementById('hp-bar').style.width = Math.max(0, (playerHP / playerMaxHP) * 100) + '%';
  document.getElementById('energy-bar').style.width = Math.max(0, (playerEnergy / playerMaxEnergy) * 100) + '%';
  document.getElementById('enemy-count').textContent = enemies.filter(e => e.alive).length;
  document.getElementById('score-display').textContent = score;
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.opacity = '1';
  messageTimer = 2.0;
}

function selectSkill(skill) {
  currentSkill = skill;
  ['rock', 'wave', 'shield'].forEach(s => {
    document.getElementById('skill-' + s + '-btn').classList.toggle('active', s === skill);
    document.getElementById('slot-' + s).classList.toggle('active', s === skill);
  });
}

// ─── GAME FLOW ─────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  gameOver = false;
  playerHP = 100; playerEnergy = 100; score = 0;
  shieldActive = false;
  buildScene();
  updateHUD();
  if (!renderer.xr.isPresenting) requestPointerLock();
}

function restartGame() {
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('victory').style.display = 'none';
  startGame();
}

function triggerDeath() {
  gameRunning = false;
  gameOver = true;
  document.getElementById('game-over').style.display = 'flex';
  document.exitPointerLock?.();
}

function triggerVictory() {
  gameRunning = false;
  document.getElementById('victory').style.display = 'flex';
  document.getElementById('final-score').textContent = 'スコア: ' + score;
  document.exitPointerLock?.();
}

// ─── POINTER LOCK ────────────────────────────────────────────────────────── 
function requestPointerLock() {
  canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
  canvas.requestPointerLock?.();
}

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked || !gameRunning) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});
document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (!gameRunning) return;
  if (!pointerLocked) { requestPointerLock(); return; }
  fireSkill();
});
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!gameRunning) return;
  if (e.code === 'Digit1') selectSkill('rock');
  if (e.code === 'Digit2') selectSkill('wave');
  if (e.code === 'Digit3') selectSkill('shield');
  if (e.code === 'Space') { e.preventDefault(); fireSkill(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('click', () => { if (gameRunning && !pointerLocked) requestPointerLock(); });

function fireSkill() {
  if (!gameRunning) return;
  if (currentSkill === 'rock') fireRock();
  else if (currentSkill === 'wave') fireWave();
  else if (currentSkill === 'shield') activateShield();
}

// ─── VR ───────────────────────────────────────────────────────────────────
async function enterVR() {
  if (!navigator.xr) { alert('このブラウザはWebXRに対応していません。\nMeta Quest BrowserまたはChrome for Androidをお試しください。'); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!supported) { alert('VRデバイスが検出されません。\nVRゴーグルを接続してください。'); return; }

  if (!gameRunning) startGame();

  const session = await navigator.xr.requestSession('immersive-vr', {
    optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
  });
  await renderer.xr.setSession(session);
  xrSession = session;
  document.getElementById('vr-guide').style.display = 'flex';

  // rigをリセット
  if (cameraRig) { scene.remove(cameraRig); cameraRig = null; }
  cameraRig = new THREE.Group();
  cameraRig.position.set(camera.position.x, 0, camera.position.z);
  scene.add(cameraRig);
  cameraRig.add(camera);
  camera.position.set(0, 0, 0);

  // VRコントローラーセットアップ
  vrControllerPrev = {};

  // コントローラーパネルのCanvasテクスチャ生成
  function makeControllerPanel(hand) {
    const w = 512, h = 300;
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const cx = cv.getContext('2d');

    function draw(highlights) {
      cx.clearRect(0, 0, w, h);
      // 背景
      cx.fillStyle = 'rgba(5,15,30,0.92)';
      cx.roundRect(0, 0, w, h, 24); cx.fill();
      cx.strokeStyle = hand === 'right' ? 'rgba(80,180,255,0.7)' : 'rgba(255,160,80,0.7)';
      cx.lineWidth = 3;
      cx.roundRect(2, 2, w-4, h-4, 22); cx.stroke();

      // タイトル
      cx.fillStyle = hand === 'right' ? '#60c8ff' : '#ffb060';
      cx.font = 'bold 28px sans-serif';
      cx.textAlign = 'center';
      cx.fillText(hand === 'right' ? '右コントローラー' : '左コントローラー', w/2, 44);

      // 区切り線
      cx.strokeStyle = 'rgba(255,255,255,0.15)';
      cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(24, 58); cx.lineTo(w-24, 58); cx.stroke();

      const rows = hand === 'right'
        ? [
            { icon: '🪨', btn: 'トリガー（人差し指）', action: '岩投げ', key: 'trigger' },
            { icon: '💨', btn: 'グリップ（中指）',     action: '衝撃波', key: 'grip' },
            { icon: '🔄', btn: 'Aボタン',              action: 'スキル切替', key: 'btnAX' },
          ]
        : [
            { icon: '🛡', btn: 'トリガー（人差し指）', action: 'バリア展開', key: 'trigger' },
            { icon: '🛡', btn: 'グリップ（中指）',     action: 'バリア展開', key: 'grip' },
            { icon: '🕹', btn: '左スティック',          action: '移動',      key: null },
          ];

      rows.forEach((row, idx) => {
        const y = 85 + idx * 72;
        const active = highlights && highlights[row.key];

        // 行背景（アクティブ時に光る）
        if (active) {
          cx.fillStyle = hand === 'right' ? 'rgba(60,160,255,0.25)' : 'rgba(255,140,40,0.25)';
          cx.roundRect(16, y - 6, w - 32, 60, 12); cx.fill();
        }

        // アイコン
        cx.font = '32px serif';
        cx.textAlign = 'left';
        cx.fillText(row.icon, 28, y + 36);

        // ボタン名
        cx.font = active ? 'bold 20px sans-serif' : '18px sans-serif';
        cx.fillStyle = active
          ? (hand === 'right' ? '#80d8ff' : '#ffd080')
          : 'rgba(255,255,255,0.55)';
        cx.textAlign = 'left';
        cx.fillText(row.btn, 76, y + 22);

        // アクション
        cx.font = active ? 'bold 26px sans-serif' : '24px sans-serif';
        cx.fillStyle = active ? '#ffffff' : 'rgba(255,255,255,0.85)';
        cx.fillText('→ ' + row.action, 76, y + 50);
      });
    }

    const tex = new THREE.CanvasTexture(cv);
    return { tex, draw, cv };
  }

  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);

    ctrl.addEventListener('connected', (ev) => {
      const hand = ev.data.handedness;
      while (ctrl.children.length > 0) ctrl.remove(ctrl.children[0]);

      // コントローラー本体メッシュ
      const ctrlMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.03, 0.12, 8),
        new THREE.MeshStandardMaterial({ color: hand === 'right' ? 0x223355 : 0x442211 })
      );
      ctrlMesh.rotation.x = -Math.PI / 4;
      ctrl.add(ctrlMesh);

      // ── ボタン説明パネル ──────────────────────────────────────
      const { tex, draw } = makeControllerPanel(hand);
      draw(null);

      const panelMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.28, 0.165),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
      );
      // コントローラーの少し上・前方に配置
      panelMesh.position.set(hand === 'right' ? 0.05 : -0.05, 0.14, -0.06);
      panelMesh.rotation.x = -0.4;
      ctrl.add(panelMesh);

      // パネルの枠にうっすらポイントライト
      const pLight = new THREE.PointLight(
        hand === 'right' ? 0x3388ff : 0xff8833, 0.4, 0.5
      );
      pLight.position.copy(panelMesh.position);
      ctrl.add(pLight);

      // レーザーポインター（右のみ）
      if (hand === 'right') {
        const laserGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -12)
        ]);
        ctrl.add(new THREE.Line(laserGeo,
          new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.5 })));
      }

      // パネルとdrawをコントローラーに紐付けて後からハイライト更新できるように
      ctrl.userData.panelTex = tex;
      ctrl.userData.panelDraw = draw;
      ctrl.userData.hand = hand;
    });

    ctrl.addEventListener('selectstart', () => {
      if (!gameRunning) return;
      const src = xrSession ? [...xrSession.inputSources][i] : null;
      const hand = src ? src.handedness : (i === 0 ? 'right' : 'left');
      if (ctrl.userData.panelDraw) { ctrl.userData.panelDraw({ trigger: true }); ctrl.userData.panelTex.needsUpdate = true; }
      if (hand === 'right') fireRock();
      else activateShield();
    });
    ctrl.addEventListener('selectend', () => {
      if (ctrl.userData.panelDraw) { ctrl.userData.panelDraw(null); ctrl.userData.panelTex.needsUpdate = true; }
    });
    ctrl.addEventListener('squeezestart', () => {
      if (!gameRunning) return;
      const src = xrSession ? [...xrSession.inputSources][i] : null;
      const hand = src ? src.handedness : (i === 0 ? 'right' : 'left');
      if (ctrl.userData.panelDraw) { ctrl.userData.panelDraw({ grip: true }); ctrl.userData.panelTex.needsUpdate = true; }
      if (hand === 'right') fireWave();
      else activateShield();
    });
    ctrl.addEventListener('squeezeend', () => {
      if (ctrl.userData.panelDraw) { ctrl.userData.panelDraw(null); ctrl.userData.panelTex.needsUpdate = true; }
    });

    cameraRig.add(ctrl);
  }

  // gamepadポーリングでAボタン押下時もパネルハイライト
  // (ループ内のbtnAX検出時に ctrl.userData.panelDraw を呼ぶためctrlsを保存)
  window._vrCtrls = [renderer.xr.getController(0), renderer.xr.getController(1)];

  session.addEventListener('end', () => {
    xrSession = null;
    vrControllerPrev = null;
    document.getElementById('vr-guide').style.display = 'none';
    if (cameraRig) {
      const wp = new THREE.Vector3();
      camera.getWorldPosition(wp);
      cameraRig.remove(camera);
      scene.add(camera);
      camera.position.copy(wp);
      camera.position.y = 1.7;
      cameraRig = null;
    }
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────
let lastTime = 0;
let cameraRig = null; // XR用の親グループ

function animate() {
  // setAnimationLoop一本化：VR中も非VR中も同じループを使う
  renderer.setAnimationLoop(xrAnimate);
}

function xrAnimate(time, xrFrame) {
  if (time === null) time = 0;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  if (!gameRunning) { renderer.render(scene, camera); return; }

  const isVR = renderer.xr.isPresenting;

  // Player movement
  const moveSpeed = 5 * dt;
  if (isVR) {
    // VRモード：rigを動かす（カメラはXRが制御）
    if (!cameraRig) {
      cameraRig = new THREE.Group();
      cameraRig.position.set(0, 0, 0);
      scene.add(cameraRig);
      cameraRig.add(camera);
    }
    // VR中の移動方向はカメラのワールド向きから取得
    const vrForward = new THREE.Vector3();
    camera.getWorldDirection(vrForward);
    vrForward.y = 0; vrForward.normalize();
    const vrRight = new THREE.Vector3().crossVectors(vrForward, new THREE.Vector3(0,1,0));
    const moveDir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(vrForward);
    if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(vrForward);
    if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(vrRight);
    if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(vrRight);
    if (moveDir.length() > 0) {
      moveDir.normalize();
      cameraRig.position.addScaledVector(moveDir, moveSpeed);
      cameraRig.position.x = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, cameraRig.position.x));
      cameraRig.position.z = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, cameraRig.position.z));
    }
    // y固定しない（XRのヘッドトラッキングに任せる）
  } else {
    // 非VRモード：直接cameraを操作
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    const moveDir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(forward);
    if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(forward);
    if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
    if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
    if (moveDir.length() > 0) {
      moveDir.normalize();
      camera.position.addScaledVector(moveDir, moveSpeed);
      camera.position.x = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, camera.position.x));
      camera.position.z = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, camera.position.z));
    }
    camera.position.y = 1.7;
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  }

  // Energy regen
  energyRegen += dt;
  if (energyRegen > 0.5) { energyRegen = 0; playerEnergy = Math.min(playerMaxEnergy, playerEnergy + 5); updateHUD(); }

  // ─── VRコントローラー入力 ────────────────────────────────────────────
  if (isVR && gameRunning) {
    // inputSourcesはxrFrameのセッションから、またはxrSessionから直接取得
    const sources = (xrFrame && xrFrame.session)
      ? xrFrame.session.inputSources
      : (xrSession ? xrSession.inputSources : []);

    if (!vrControllerPrev) vrControllerPrev = {};

    for (const src of sources) {
      const gp = src.gamepad;
      if (!gp || !gp.buttons) continue;

      const hand = src.handedness; // 'right' | 'left' | 'none'
      if (!vrControllerPrev[hand]) {
        vrControllerPrev[hand] = { trigger: false, grip: false, btnAX: false };
      }
      const prev = vrControllerPrev[hand];

      // Meta Quest / 標準WebXR Gamepad ボタン配列:
      //   buttons[0] = trigger（人差し指）
      //   buttons[1] = grip（中指）
      //   buttons[4] = A(右) / X(左)
      //   buttons[5] = B(右) / Y(左)
      // pressedフラグが実装されていない機種もあるためvalueも見る
      const triggerBtn = gp.buttons[0];
      const gripBtn    = gp.buttons[1];
      const axBtn      = gp.buttons[4];

      const trigger = triggerBtn ? (triggerBtn.pressed || triggerBtn.value > 0.5) : false;
      const grip    = gripBtn    ? (gripBtn.pressed    || gripBtn.value    > 0.5) : false;
      const btnAX   = axBtn      ? (axBtn.pressed      || axBtn.value      > 0.5) : false;

      // エッジ検出（押した瞬間だけ発火）
      if (trigger && !prev.trigger) {
        if (hand === 'right') fireRock();
        else                  activateShield();
      }
      if (grip && !prev.grip) {
        if (hand === 'right') fireWave();
        else                  activateShield();
      }
      if (btnAX && !prev.btnAX) {
        const skills = ['rock', 'wave', 'shield'];
        selectSkill(skills[(skills.indexOf(currentSkill) + 1) % skills.length]);
        // Aボタンパネルハイライト
        if (window._vrCtrls) {
          const c = window._vrCtrls.find(c => c.userData.hand === hand);
          if (c && c.userData.panelDraw) {
            c.userData.panelDraw({ btnAX: true }); c.userData.panelTex.needsUpdate = true;
            setTimeout(() => { if (c.userData.panelDraw) { c.userData.panelDraw(null); c.userData.panelTex.needsUpdate = true; } }, 300);
          }
        }
      }

      // 左スティックで移動（axes[2]/axes[3] がサムスティック、axes[0]/axes[1] はタッチパッド）
      if (hand === 'left' && gp.axes && gp.axes.length >= 2) {
        const ax = gp.axes.length >= 4 ? gp.axes[2] : gp.axes[0];
        const ay = gp.axes.length >= 4 ? gp.axes[3] : gp.axes[1];
        if (Math.abs(ax) > 0.15 || Math.abs(ay) > 0.15) {
          const vrForward = new THREE.Vector3();
          camera.getWorldDirection(vrForward); vrForward.y = 0; vrForward.normalize();
          const vrRight = new THREE.Vector3().crossVectors(vrForward, new THREE.Vector3(0,1,0));
          if (cameraRig) {
            cameraRig.position.addScaledVector(vrForward, -ay * moveSpeed * 2.5);
            cameraRig.position.addScaledVector(vrRight,    ax * moveSpeed * 2.5);
            cameraRig.position.x = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, cameraRig.position.x));
            cameraRig.position.z = Math.max(-ARENA_SIZE+1, Math.min(ARENA_SIZE-1, cameraRig.position.z));
          }
        }
      }

      prev.trigger = trigger;
      prev.grip    = grip;
      prev.btnAX   = btnAX;
    }
  }

  // Shield timer
  if (shieldActive) {
    shieldTime -= dt;
    if (shieldTime <= 0) {
      shieldActive = false;
      shieldMesh.visible = false;
    } else {
      shieldMesh.material.opacity = 0.15 + 0.15 * Math.sin(time * 0.005);
      shieldMesh.rotation.y += dt;
    }
  }

  // Message timer
  if (messageTimer > 0) {
    messageTimer -= dt;
    if (messageTimer <= 0) document.getElementById('message').style.opacity = '0';
  }

  // Update rocks
  rocks = rocks.filter(r => {
    r.life -= dt;
    if (r.life <= 0) { scene.remove(r.mesh); return false; }
    r.mesh.position.addScaledVector(r.dir, r.speed * dt);
    r.mesh.rotation.x += r.spin.x * dt * 3;
    r.mesh.rotation.y += r.spin.y * dt * 3;
    if (r.mesh.position.y > 0) r.dir.y -= 4 * dt; // gravity
    if (r.mesh.position.y < 0) { scene.remove(r.mesh); return false; }
    if (checkRockEnemyCollision(r)) { scene.remove(r.mesh); return false; }
    if (checkRockHumanoidCollision(r)) { scene.remove(r.mesh); return false; }
    return true;
  });

  // Update waves
  waves = waves.filter(w => {
    w.life -= dt;
    if (w.life <= 0) { scene.remove(w.mesh); return false; }
    w.mesh.position.addScaledVector(w.dir, w.speed * dt);
    w.radius += w.speed * dt * 0.15;
    w.mesh.scale.setScalar(1 + (1.0 - w.life / 2.0) * 3);
    w.mesh.material.opacity = w.life / 2.0;
    if (checkWaveEnemyCollision(w)) { scene.remove(w.mesh); return false; }
    return true;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.life -= dt;
    if (b.life <= 0) { scene.remove(b.mesh); return false; }
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);
    b.mesh.rotation.x += dt * 4;
    // Enemy-enemy collision (no damage between enemies)
    if (checkBulletPlayerCollision(b)) { scene.remove(b.mesh); return false; }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.life -= dt;
    if (p.life <= 0) { scene.remove(p.mesh); return false; }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = p.life / p.maxLife;
    return true;
  });

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    e.attackTimer -= dt;
    if (e.stagger > 0) { e.stagger -= dt; continue; }

    const toPlayer = new THREE.Vector3().subVectors(camera.position, e.group.position);
    const dist = toPlayer.length();
    toPlayer.normalize();
    toPlayer.y = 0;

    // Move toward player
    const spd = e.speed * dt;
    e.group.position.addScaledVector(toPlayer, spd);
    e.group.position.y = 0.8;
    e.group.lookAt(camera.position.x, 0.8, camera.position.z);

    // Bob animation
    e.group.position.y = 0.8 + Math.sin(time * 0.003 + e.bobOffset) * 0.05;

    // Attack
    if (e.attackTimer <= 0 && dist < 20) {
      e.attackTimer = 2.0 + Math.random() * 2.0;
      enemyAttack(e);
    }

    // Melee damage if very close
    if (dist < 1.2) {
      playerHP -= 10 * dt;
      updateHUD();
      if (playerHP <= 0) triggerDeath();
    }

    updateEnemyBar(e);
  }

  // 人型敵の更新
  updateHumanoids(dt, time);

  renderer.render(scene, camera);
}

// ─── INIT ──────────────────────────────────────────────────────────────────
initRenderer();
// 最初からsetAnimationLoopで動かす（VR移行もシームレスに）
renderer.setAnimationLoop(xrAnimate);

// Expose for buttons
window.selectSkill = selectSkill;
window.enterVR = enterVR;
window.startGame = startGame;
window.restartGame = restartGame;
</script>
</body>
</html>
